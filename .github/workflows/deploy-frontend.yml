name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '18'
  AWS_REGION: 'ap-south-1'
  S3_BUCKET: 'devshram.com'
  S3_PREFIX: 'projects/thor'
  CLOUDFRONT_DISTRIBUTION_ID: 'E2RU8A6DN1OCFF'
  AWS_ROLE_ARN: 'arn:aws:iam::532197675314:role/avi89nash_s3_upload'
  API_URL: 'https://thor-api.devshram.in'
  API_KEY: ''

jobs:
  # Job 1: Build and Test
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Extract version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests
        run: npm test -- --passWithNoTests --watchAll=false
        continue-on-error: true

      - name: Build frontend
        env:
          REACT_APP_API_URL: ${{ env.API_URL }}
          REACT_APP_API_KEY: ${{ env.API_KEY }}
          REACT_APP_VERSION: ${{ steps.version.outputs.VERSION }}
          CI: false
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 1

  # Job 2: Validate Build
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: build

      - name: Check build output
        run: |
          echo "Validating build output..."

          # Check if index.html exists
          if [ ! -f "build/index.html" ]; then
            echo "ERROR: index.html not found!"
            exit 1
          fi

          # Check if static assets exist
          if [ ! -d "build/static" ]; then
            echo "ERROR: static directory not found!"
            exit 1
          fi

          # Check JS files exist
          JS_COUNT=$(find build/static/js -name "*.js" | wc -l)
          if [ "$JS_COUNT" -eq 0 ]; then
            echo "ERROR: No JavaScript files found!"
            exit 1
          fi

          # Check CSS files exist
          CSS_COUNT=$(find build/static/css -name "*.css" | wc -l)
          if [ "$CSS_COUNT" -eq 0 ]; then
            echo "ERROR: No CSS files found!"
            exit 1
          fi

          echo "Build validation passed!"
          echo "  - index.html: OK"
          echo "  - JS files: $JS_COUNT"
          echo "  - CSS files: $CSS_COUNT"

      - name: Check for sensitive data
        run: |
          echo "Checking for sensitive data leaks..."

          # Check for common sensitive patterns
          SENSITIVE_PATTERNS="password|secret|api_key|private_key|AWS_SECRET"

          if grep -rEi "$SENSITIVE_PATTERNS" build/ --include="*.js" --include="*.html" | grep -v "node_modules"; then
            echo "WARNING: Potential sensitive data found in build!"
            # Not failing, just warning
          else
            echo "No sensitive data patterns found. OK!"
          fi

  # Job 3: Health Check Server
  health-check:
    name: Check API Server Health
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check API server is reachable
        run: |
          API_URL="${{ env.API_URL }}"
          echo "Checking API server health at: $API_URL/health"

          # Try health endpoint with retry
          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" --connect-timeout 10 || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "API server is healthy! (HTTP $HTTP_STATUS)"
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt $RETRY_COUNT: API returned HTTP $HTTP_STATUS, retrying..."
            sleep 5
          done

          echo "WARNING: API server health check failed after $MAX_RETRIES attempts"
          echo "Deployment will continue but please verify the API server is running"
          # Not failing deployment, just warning

  # Job 4: Deploy to S3
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: [build, validate, health-check]
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy versioned build to S3
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          S3_DEST="s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/v${VERSION}"

          echo "Deploying v${VERSION} to $S3_DEST..."

          # Sync static assets with long-term cache (hashed filenames)
          aws s3 sync build/ "$S3_DEST" \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "index.html" \
            --exclude "*.json"

          # Upload index.html with no-cache
          aws s3 cp build/index.html "$S3_DEST/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

          # Upload JSON files with no-cache
          find build -name "*.json" | while read f; do
            key="${f#build/}"
            aws s3 cp "$f" "$S3_DEST/$key" \
              --cache-control "no-cache,no-store,must-revalidate"
          done

          echo "Versioned build deployed to $S3_DEST"

      - name: Upload loader index.html
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          API_URL="${{ env.API_URL }}"

          cat > /tmp/index.html << LOADER
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Thor</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              body{background:#0f172a;color:#f1f5f9;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
              .card{text-align:center;padding:2rem;max-width:400px}
              h1{font-size:2rem;font-weight:700;margin-bottom:.5rem;color:#e2e8f0}
              .status{font-size:1rem;color:#94a3b8;margin-bottom:1.5rem}
              .dot{display:inline-block;animation:blink 1.2s infinite}
              .dot:nth-child(2){animation-delay:.2s}
              .dot:nth-child(3){animation-delay:.4s}
              @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
              .error{background:#450a0a;border:1px solid #7f1d1d;border-radius:.75rem;padding:1.25rem;color:#fca5a5}
              .error h2{font-size:1.1rem;margin-bottom:.5rem;color:#f87171}
              .error p{font-size:.875rem;margin-bottom:1rem;color:#fca5a5}
              button{background:#1e40af;color:#fff;border:none;padding:.6rem 1.5rem;border-radius:.5rem;cursor:pointer;font-size:.875rem}
              button:hover{background:#1d4ed8}
              .version{font-size:.75rem;color:#475569;margin-top:1.5rem}
            </style>
          </head>
          <body>
            <div class="card">
              <h1>Thor</h1>
              <div id="loading">
                <p class="status">Connecting<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>
              </div>
              <div id="error" style="display:none">
                <div class="error">
                  <h2>Backend Offline</h2>
                  <p id="error-msg">Could not reach the Thor server. Make sure it is running on your local network.</p>
                  <button onclick="load()">Retry</button>
                </div>
              </div>
              <p class="version">loader v${VERSION}</p>
            </div>
            <script>
              const API = '${API_URL}';
              function load() {
                document.getElementById('loading').style.display = '';
                document.getElementById('error').style.display = 'none';
                fetch(API + '/frontend', { signal: AbortSignal.timeout(8000) })
                  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                  .then(d => { window.location.replace(d.url); })
                  .catch(e => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error').style.display = '';
                    document.getElementById('error-msg').textContent = e.message || 'Could not reach the Thor server.';
                  });
              }
              load();
            </script>
          </body>
          </html>
          LOADER

          aws s3 cp /tmp/index.html \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

          echo "Loader uploaded to s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/index.html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/${{ env.S3_PREFIX }}/*"

      - name: Deployment summary
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          echo "========================================="
          echo "DEPLOYMENT COMPLETE  v${VERSION}"
          echo "========================================="
          echo "Loader:   s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/index.html"
          echo "App:      s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/v${VERSION}/"
          echo "Region:   ap-south-1"
          echo "API:      ${{ env.API_URL }}"
          echo "========================================="

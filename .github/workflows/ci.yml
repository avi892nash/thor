name: Thor CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'server/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'server/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  AWS_REGION: 'ap-south-1'
  S3_BUCKET: 'devshram.com'
  S3_PREFIX: 'projects/thor'
  CLOUDFRONT_DISTRIBUTION_ID: 'E2RU8A6DN1OCFF'
  AWS_ROLE_ARN: 'arn:aws:iam::532197675314:role/avi89nash_s3_upload'
  API_URL: 'https://thor-api.devshram.in'
  API_KEY: ''

# Pipeline shape:
#
#   version ──► build-frontend ──┐
#            └► build-server  ───┴──► release
#
# release runs only when BOTH builds succeed. Any failure crashes the pipeline.

jobs:
  # ---------------------------------------------------------------------------
  # Lint PR commit messages against conventional-commits
  # (config: commitlint.config.cjs)
  # ---------------------------------------------------------------------------
  commitlint:
    name: 'Commitlint'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  # ---------------------------------------------------------------------------
  # Compute next semver via semantic-release dry-run (config: release.config.cjs)
  # Output: {semver}+{short-sha}, e.g. 1.1.0+daabfb5
  # ---------------------------------------------------------------------------
  version:
    name: 'Version'
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.v.outputs.BASE }}
      full: ${{ steps.v.outputs.FULL }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          BASE=$(node -p "require('./server/package.json').version")
          SHA=$(git rev-parse --short HEAD)
          echo "BASE=${BASE}"        >> $GITHUB_OUTPUT
          echo "FULL=${BASE}+${SHA}" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Build frontend
  # ---------------------------------------------------------------------------
  build-frontend:
    name: '[Frontend] Build'
    runs-on: ubuntu-latest
    needs: version
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Test
        run: npm test -- --passWithNoTests --watchAll=false
        continue-on-error: true

      - name: Build
        env:
          REACT_APP_API_URL: ${{ env.API_URL }}
          REACT_APP_API_KEY: ${{ env.API_KEY }}
          REACT_APP_VERSION: ${{ needs.version.outputs.full }}
          CI: false
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Build server .deb
  # ---------------------------------------------------------------------------
  build-server:
    name: '[Server] Build .deb'
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Build (typecheck + esbuild bundle)
        working-directory: server
        run: npm run build

      - name: Embed commit SHA
        run: echo "${{ github.sha }}" > server/dist/.version

      - name: Stage & build .deb
        run: |
          FULL="${{ needs.version.outputs.full }}"
          STAGING=$(mktemp -d)

          cp -r server/package/DEBIAN "$STAGING/DEBIAN"
          chmod 755 "$STAGING/DEBIAN/postinst" "$STAGING/DEBIAN/prerm"
          sed -i "s/__VERSION__/$FULL/" "$STAGING/DEBIAN/control"

          mkdir -p "$STAGING/usr/lib/thor-server"
          cp -r server/dist "$STAGING/usr/lib/thor-server/dist"

          mkdir -p "$STAGING/usr/bin"
          cp server/package/usr/bin/thor-server-update "$STAGING/usr/bin/thor-server-update"
          chmod 755 "$STAGING/usr/bin/thor-server-update"

          mkdir -p "$STAGING/usr/share/thor-server"
          cp server/package/usr/share/thor-server/rooms.json.default \
             "$STAGING/usr/share/thor-server/rooms.json.default"

          mkdir -p "$STAGING/etc/thor-server"

          mkdir -p "$STAGING/lib/systemd/system"
          cp server/package/lib/systemd/system/thor-server.service "$STAGING/lib/systemd/system/"
          cp server/package/lib/systemd/system/thor-update.service  "$STAGING/lib/systemd/system/"
          cp server/package/lib/systemd/system/thor-update.timer    "$STAGING/lib/systemd/system/"

          dpkg-deb --build "$STAGING" thor-api.deb
          echo "DEB_SHA256=$(sha256sum thor-api.deb | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "Built thor-api.deb ($DEB_SHA256)"

      - uses: actions/upload-artifact@v4
        with:
          name: server-deb
          path: thor-api.deb
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Combined release — runs only when BOTH builds succeed
  # ---------------------------------------------------------------------------
  release:
    name: 'Release v${{ needs.version.outputs.full }}'
    runs-on: ubuntu-latest
    needs: [version, build-frontend, build-server]
    if: github.event_name != 'pull_request'
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build

      - uses: actions/download-artifact@v4
        with:
          name: server-deb
          path: .

      # ── Validate frontend ────────────────────────────────────────────────
      - name: Validate frontend build
        run: |
          [ -f frontend-build/index.html ] || { echo "ERROR: index.html missing"; exit 1; }
          JS=$(find frontend-build/static/js  -name "*.js"  | wc -l)
          CSS=$(find frontend-build/static/css -name "*.css" | wc -l)
          [ "$JS"  -gt 0 ] || { echo "ERROR: no JS files";  exit 1; }
          [ "$CSS" -gt 0 ] || { echo "ERROR: no CSS files"; exit 1; }
          echo "Frontend OK — JS: $JS  CSS: $CSS"

      # ── Check API health (soft — warns but doesn't block release) ────────
      - name: Check API health
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ env.API_URL }}/health" --connect-timeout 10 || echo "000")
            [ "$STATUS" = "200" ] && { echo "API healthy (HTTP $STATUS)"; break; }
            echo "Attempt $i: HTTP $STATUS"
            sleep 5
          done
          echo "Continuing with release"

      # ── AWS credentials ──────────────────────────────────────────────────
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Deploy frontend to S3 ────────────────────────────────────────────
      - name: Deploy frontend to S3
        run: |
          BASE="${{ needs.version.outputs.base }}"
          DEST="s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/v${BASE}"
          echo "Deploying v${BASE} → $DEST"

          aws s3 sync frontend-build/ "$DEST" \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "index.html" \
            --exclude "*.json"

          aws s3 cp frontend-build/index.html "$DEST/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

          find frontend-build -name "*.json" | while read f; do
            aws s3 cp "$f" "$DEST/${f#frontend-build/}" \
              --cache-control "no-cache,no-store,must-revalidate"
          done

      # ── Upload loader ────────────────────────────────────────────────────
      - name: Upload loader index.html
        run: |
          FULL="${{ needs.version.outputs.full }}"
          cat > /tmp/index.html << LOADER
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Thor</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              body{background:#0f172a;color:#f1f5f9;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
              .card{text-align:center;padding:2rem;max-width:400px}
              h1{font-size:2rem;font-weight:700;margin-bottom:.5rem;color:#e2e8f0}
              .status{font-size:1rem;color:#94a3b8;margin-bottom:1.5rem}
              .dot{display:inline-block;animation:blink 1.2s infinite}
              .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
              @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
              .error{background:#450a0a;border:1px solid #7f1d1d;border-radius:.75rem;padding:1.25rem;color:#fca5a5}
              .error h2{font-size:1.1rem;margin-bottom:.5rem;color:#f87171}
              .error p{font-size:.875rem;margin-bottom:1rem}
              button{background:#1e40af;color:#fff;border:none;padding:.6rem 1.5rem;border-radius:.5rem;cursor:pointer;font-size:.875rem}
              button:hover{background:#1d4ed8}
              .version{font-size:.75rem;color:#475569;margin-top:1.5rem}
            </style>
          </head>
          <body>
            <div class="card">
              <h1>Thor</h1>
              <div id="loading"><p class="status">Connecting<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p></div>
              <div id="error" style="display:none">
                <div class="error">
                  <h2>Backend Offline</h2>
                  <p id="error-msg">Could not reach the Thor server.</p>
                  <button onclick="load()">Retry</button>
                </div>
              </div>
              <p class="version">v${FULL}</p>
            </div>
            <script>
              const API='${{ env.API_URL }}';
              function load(){
                document.getElementById('loading').style.display='';
                document.getElementById('error').style.display='none';
                fetch(API+'/frontend',{signal:AbortSignal.timeout(8000)})
                  .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
                  .then(d=>{window.location.replace(d.url);})
                  .catch(e=>{
                    document.getElementById('loading').style.display='none';
                    document.getElementById('error').style.display='';
                    document.getElementById('error-msg').textContent=e.message||'Could not reach the Thor server.';
                  });
              }
              load();
            </script>
          </body>
          </html>
          LOADER

          aws s3 cp /tmp/index.html \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      # ── Invalidate CloudFront ────────────────────────────────────────────
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/${{ env.S3_PREFIX }}/*"

      # ── Publish via semantic-release ─────────────────────────────────────
      # Bumps server/package.json, commits [skip ci], tags v*, creates GH
      # release with notes + thor-api.deb attached. Config: release.config.cjs
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install release tooling
        run: npm ci --no-audit --no-fund

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Summary
        run: |
          BASE="${{ needs.version.outputs.base }}"
          FULL="${{ needs.version.outputs.full }}"
          echo "======================================="
          echo "  Released Thor v${FULL}"
          echo "======================================="
          echo "  Frontend: s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/v${BASE}/"
          echo "  Server:   thor-api.deb @ github release 'latest'"
          echo "  Commit:   ${{ github.sha }}"
          echo "======================================="

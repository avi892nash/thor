name: Test Published Release

on:
  release:
    types: [published]

jobs:
  test-published-deb:
    name: 'Install & smoke-test published .deb'
    runs-on: ubuntu-latest
    steps:
      - name: Download thor-api.deb from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "thor-api.deb" \
            --output thor-api.deb

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install .deb
        run: sudo apt-get install -y ./thor-api.deb

      - name: Verify package registered
        run: dpkg -s thor-server | grep -E "^(Status|Version):"

      - name: Smoke-test server (health + auth round-trip)
        run: |
          [ -f /usr/lib/thor-server/dist/server.cjs ] || { echo "FAIL: server.cjs missing"; exit 1; }
          DATADIR=$(mktemp -d)
          echo '{"users":[]}' > "$DATADIR/users.json"
          DATA_DIR=$DATADIR JWT_SECRET=ci-test-secret PORT=19877 \
            node /usr/lib/thor-server/dist/server.cjs &
          PID=$!
          sleep 2
          trap 'kill $PID 2>/dev/null || true' EXIT

          HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:19877/health || echo "000")
          [ "$HTTP" = "200" ] || { echo "FAIL: /health returned $HTTP"; exit 1; }

          REG=$(curl -s -X POST http://localhost:19877/auth/register \
            -H "Content-Type: application/json" \
            -d '{"username":"smoke","password":"smoke-pw"}')
          TOKEN=$(echo "$REG" | python3 -c "import sys,json;print(json.load(sys.stdin)['token'])")
          [ -n "$TOKEN" ] || { echo "FAIL: register did not return token: $REG"; exit 1; }

          AUTH_HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" http://localhost:19877/api/rooms)
          [ "$AUTH_HTTP" = "200" ] || { echo "FAIL: /api/rooms with token returned $AUTH_HTTP"; exit 1; }

          echo "PASS: /health + auth round-trip ok"

      - name: Verify systemd units
        run: |
          for f in /lib/systemd/system/thor-server.service \
                   /lib/systemd/system/thor-update.service \
                   /lib/systemd/system/thor-update.timer; do
            [ -f "$f" ] || { echo "FAIL: $f missing"; exit 1; }
          done
          echo "PASS: all systemd units present"
